[package]
name = "arithmetics"
version = "0.1.0"
edition = "2021"
authors = ["raventid"]
description = "Comprehensive comparison and benchmarking of Rust arithmetic libraries"
license = "MIT"

[dependencies]
rust_decimal = "1.33"
bigdecimal = "0.4"
decimal = "2.1"
fixed = "1.24"
half = "2.3"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
clap = { version = "4.4", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
num_cpus = "1.16"
rayon = "1.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["sysinfoapi"] }

[[bench]]
name = "arithmetic_comparison"
harness = false

[[bench]]
name = "complex_operations"
harness = false

[[bench]]
name = "fixed_point"
harness = false

[[bench]]
name = "half_precision"
harness = false

[[bench]]
name = "multithreaded_operations"
harness = false

[[bench]]
name = "real_world_applications"
harness = false

[[bench]]
name = "error_analysis_benchmarks"
harness = false

[dev-dependencies]
criterion = "0.5"